<!DOCTYPE html>
<html>
    <body>
        <script>
            var frutas= ["Ferrari", "Porshe", "Bugati", "Lamborguini", "Jaguar",  "Bentley",];
            // Vamos exibir todos os elementos de um array usando um ciclo for
            for (var i = 0; i < frutas.length; i++) {
                document.write("Eu gostaria de conduzir " + frutas[i]);
                document.write("<br>");
            }
        </script>
    </body>
</html>
